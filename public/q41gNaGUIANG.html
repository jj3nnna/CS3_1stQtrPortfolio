<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Tracker - CRUD Complete</title>
    <style>
        /* CSS Implementation */
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px; /* Slightly wider to accommodate the delete button */
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        /* Star Rating Form Styles */
        .rating-container {
            display: flex;
            gap: 5px;
            font-size: 24px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .star {
            color: #ccc;
            transition: color 0.2s;
        }

        .star.active {
            color: #ffd700;
        }

        /* Button Styles */
        button.add-btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button.add-btn:hover {
            background-color: #0056b3;
        }

        /* Movie List & Delete Button Styles */
        .movie-list-container {
            margin-top: 30px;
        }

        .movie-item {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
            background-color: #fafafa;
            font-size: 15px;
            color: #333;
            display: flex; /* Flexbox to align text and button */
            justify-content: space-between;
            align-items: center;
        }

        .movie-info {
            flex-grow: 1;
        }

        .movie-stars {
            color: #ffd700;
            letter-spacing: 2px;
        }

        button.delete-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
            transition: background-color 0.2s;
        }

        button.delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Add / Update a Movie</h2>
        
        <div class="form-group">
            <label for="title">Title:</label>
            <input type="text" id="title" placeholder="Enter movie title">
        </div>

        <div class="form-group">
            <label for="year">Year:</label>
            <input type="number" id="year" placeholder="Enter release year">
        </div>

        <div class="form-group">
            <label for="genre">Genre:</label>
            <select id="genre">
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Horror">Horror</option>
            </select>
        </div>

        <div class="form-group">
            <label>Rating:</label>
            <div class="rating-container" id="starRating">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
        </div>

        <button class="add-btn" onclick="addOrUpdateMovie()">Submit Movie</button>

        <div class="movie-list-container">
            <h2>Movie List</h2>
            <div id="movieList">
                </div>
        </div>
    </div>

    <script>
        // --- 1. State Variables ---
        let currentRating = 0;
        const LOCAL_STORAGE_KEY = 'movies';

        // --- 2. Star Rating Logic for Form ---
        const stars = document.querySelectorAll('.star');
        stars.forEach(star => {
            star.addEventListener('click', function() {
                currentRating = parseInt(this.getAttribute('data-value'));
                updateStarUI(currentRating);
            });
        });

        function updateStarUI(rating) {
            stars.forEach(star => {
                if (parseInt(star.getAttribute('data-value')) <= rating) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        // --- 3. CRUD: Read Data from LocalStorage ---
        function getMovies() {
            const moviesString = localStorage.getItem(LOCAL_STORAGE_KEY);
            return moviesString ? JSON.parse(moviesString) : [];
        }

        // --- 4. Render Movies to the DOM ---
        function displayMovies() {
            const movieListDiv = document.getElementById('movieList');
            const movies = getMovies();
            movieListDiv.innerHTML = ''; // Clear current list

            movies.forEach((movie, index) => {
                // Round the average rating to the nearest whole number for the star display
                let roundedRating = Math.round(parseFloat(movie.rating));
                let starsHTML = '';
                for (let i = 0; i < roundedRating; i++) {
                    starsHTML += '★';
                }

                const movieDiv = document.createElement('div');
                movieDiv.className = 'movie-item';
                
                // Show exact decimal rating alongside the stars, plus the new Delete button
                movieDiv.innerHTML = `
                    <div class="movie-info">
                        ${movie.title} (${movie.year}) - ${movie.genre}<br>
                        Rating: ${parseFloat(movie.rating).toFixed(1)} <span class="movie-stars">${starsHTML}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteMovie(${index})">Delete</button>
                `;
                
                movieListDiv.appendChild(movieDiv);
            });
        }

        // --- 5. CRUD: Create & Update Logic ---
        function addOrUpdateMovie() {
            const titleInput = document.getElementById('title').value.trim();
            const yearInput = document.getElementById('year').value.trim();
            const genreInput = document.getElementById('genre').value;

            if (!titleInput || !yearInput || currentRating === 0) {
                alert("Please fill out the title, year, and select a rating.");
                return;
            }

            const movies = getMovies();
            
            // Check if movie already exists (case-insensitive search)
            const existingMovieIndex = movies.findIndex(m => m.title.toLowerCase() === titleInput.toLowerCase());

            if (existingMovieIndex !== -1) {
                // --- UPDATE OPERATION ---
                const existingMovie = movies[existingMovieIndex];
                
                // Track how many times it's been rated to calculate a true average
                const count = existingMovie.ratingCount ? parseInt(existingMovie.ratingCount) : 1; 
                const oldRating = parseFloat(existingMovie.rating);
                
                // Calculate new average: ((Old Average * Old Count) + New Rating) / New Count
                const newAverage = ((oldRating * count) + currentRating) / (count + 1);

                existingMovie.year = yearInput.toString();
                existingMovie.genre = genreInput;
                existingMovie.rating = newAverage.toString();
                existingMovie.ratingCount = (count + 1).toString();
                
            } else {
                // --- CREATE OPERATION ---
                const newMovie = {
                    title: titleInput,
                    year: yearInput.toString(),
                    genre: genreInput,
                    rating: currentRating.toString(),
                    ratingCount: "1" // Initialize rating count for future averaging
                };
                movies.push(newMovie);
            }

            // Save to localStorage and re-render
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(movies));
            resetForm();
            displayMovies();
        }

        // --- 6. CRUD: Delete Logic ---
        function deleteMovie(index) {
            // Confirmation dialog before deleting
            const confirmDelete = confirm("Are you sure you want to delete this movie?");
            
            if (confirmDelete) {
                const movies = getMovies();
                // Remove 1 item at the specified index
                movies.splice(index, 1); 
                // Save updated array to localStorage and re-render
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(movies));
                displayMovies();
            }
        }

        // Helper function to clear the inputs
        function resetForm() {
            document.getElementById('title').value = '';
            document.getElementById('year').value = '';
            document.getElementById('genre').value = 'Action';
            currentRating = 0;
            updateStarUI(0);
        }

        // --- 7. Initialization ---
        window.onload = () => {
            displayMovies();
        };
    </script>

</body>
</html>
